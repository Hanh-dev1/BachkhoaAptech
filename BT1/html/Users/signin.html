<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link rel="stylesheet" href="../../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="row full-height-row">
        <!-- ẢNH -->
        <div class="col-md-6 left-image">
            <img src="../../img/banner_signin.jpg" class="img-fluid" alt="Banner đăng nhập">
        </div>

        <!-- FORM -->
        <div class="col-md-6 right-form">
            <h3 class="text-center">Đăng nhập</h3>

            <form id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control">
                    <small class="text-danger"></small>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" class="form-control">
                    <small class="text-danger"></small>
                </div>

                <button type="submit" class="btn btn-dark btn-block">Đăng nhập</button>
            </form>

            <p class="text-center mt-3">
                Chưa có tài khoản? <a href="signup.html" target="_blank">Đăng ký</a>
            </p>
        </div>
    </div>

    <script>
        // Hàm hiển thị lỗi
        function showError(input, message) {
            input.nextElementSibling.innerText = message;
        }
        
        // Hàm xóa lỗi
        function clearError(input) {
            input.nextElementSibling.innerText = "";
        }
        
        // Bắt sự kiện submit
        document.getElementById("loginForm").addEventListener("submit", function(e) {
        
            // Không reload trang
            e.preventDefault();
        
            let email = document.getElementById("loginEmail");
            let password = document.getElementById("loginPassword");
        
            let valid = true;
        
            // Kiểm tra email
            if (email.value.trim() === "") {
                showError(email, "Không được để trống");
                valid = false;
            } else {
                clearError(email);
            }
        
            // Kiểm tra mật khẩu
            if (password.value.trim() === "") {
                showError(password, "Không được để trống");
                valid = false;
            } else {
                clearError(password);
            }
        
            // Nếu hợp lệ → chuyển về trang chủ
            if (valid) {
                window.location.href = "../index.html";
            }
        });
    </script>


    <script src="../../js/jquery-3.7.1.slim.min.js"></script>
    <script src="../../js/bootstrap.min.js"></script>
</body>
</html>
